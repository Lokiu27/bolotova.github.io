## HTTP: редирект на HTTPS (Cloudflare -> VPS по 80 можно оставить при необходимости)
server {
    listen 80;
    server_name _;

    return 301 https://$host$request_uri;
}

## HTTPS: Cloudflare -> Nginx по Origin Certificate
server {
    listen 443 ssl http2;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Пути к Origin Certificate и приватному ключу Cloudflare
    ssl_certificate     /etc/nginx/ssl/origin.crt;
    ssl_certificate_key /etc/nginx/ssl/origin.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Безопасность: скрытие версии nginx
    server_tokens off;

    # Ограничение размера тела запроса (защита от DoS)
    client_max_body_size 1m;

    # Таймауты для защиты от slowloris-атак
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;
    keepalive_timeout 65s;

    # Content Security Policy (с 'unsafe-inline' для JSON-LD скриптов)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self';" always;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # SEO: robots.txt
    location = /robots.txt {
        add_header Content-Type text/plain;
        add_header Cache-Control "public, max-age=3600";
    }

    # SEO: sitemap.xml
    location = /sitemap.xml {
        add_header Content-Type application/xml;
        add_header Cache-Control "public, max-age=3600";
    }

    # SEO: llms.txt для AI-агентов
    location = /llms.txt {
        add_header Content-Type "text/plain; charset=utf-8";
        add_header Cache-Control "public, max-age=3600";
    }

    # SEO: llms-full.txt для AI-агентов
    location = /llms-full.txt {
        add_header Content-Type "text/plain; charset=utf-8";
        add_header Cache-Control "public, max-age=3600";
    }

    # MkDocs документация
    location /course/ {
        alias /usr/share/nginx/course/;
        index index.html;
        try_files $uri $uri/ $uri/index.html =404;

        # CSP специфичный для MkDocs Material theme
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

        # Запрет листинга директорий
        autoindex off;

        # Запрет доступа к скрытым файлам
        location ~ /\. {
            deny all;
            return 404;
        }

        # Кэширование статики MkDocs
        location ~* /course/.*\.(?:css|js|woff2?|ttf|eot)$ {
            access_log off;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header X-Content-Type-Options "nosniff" always;
        }
    }

    # Правило для SPA: всегда отдаём index.html, если файл не найден
    location / {
        try_files $uri $uri/ /index.html;
        
        # SEO: X-Robots-Tag для HTML-страниц
        add_header X-Robots-Tag "index, follow" always;
    }

    # Долгосрочное кеширование для JS и CSS
    location ~* \.(?:js|css)$ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Долгосрочное кеширование для изображений
    location ~* \.(?:png|jpe?g|gif|svg|webp|ico)$ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # JSON данные (часто обновляются) — без агрессивного кеширования
    location ~* \.(?:json)$ {
        add_header Cache-Control "no-cache";
    }

    # Опционально: gzip для оптимизации трафика
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types text/plain text/css application/javascript application/json application/xml+rss image/svg+xml;

    # -----------------------------
    # Опционально: реальный IP от Cloudflare
    # -----------------------------
    # real_ip_header CF-Connecting-IP;
    # set_real_ip_from 173.245.48.0/20;
    # set_real_ip_from 103.21.244.0/22;
    # set_real_ip_from 103.22.200.0/22;
    # set_real_ip_from 103.31.4.0/22;
    # set_real_ip_from 141.101.64.0/18;
    # set_real_ip_from 108.162.192.0/18;
    # set_real_ip_from 190.93.240.0/20;
    # set_real_ip_from 188.114.96.0/20;
    # set_real_ip_from 197.234.240.0/22;
    # set_real_ip_from 198.41.128.0/17;
    # set_real_ip_from 162.158.0.0/15;
    # set_real_ip_from 104.16.0.0/13;
    # set_real_ip_from 104.24.0.0/14;
    # set_real_ip_from 172.64.0.0/13;
    # set_real_ip_from 131.0.72.0/22;

    # -----------------------------
    # Опционально: ограничить доступ только Cloudflare
    # -----------------------------
    # allow 173.245.48.0/20;
    # allow 103.21.244.0/22;
    # allow 103.22.200.0/22;
    # allow 103.31.4.0/22;
    # allow 141.101.64.0/18;
    # allow 108.162.192.0/18;
    # allow 190.93.240.0/20;
    # allow 188.114.96.0/20;
    # allow 197.234.240.0/22;
    # allow 198.41.128.0/17;
    # allow 162.158.0.0/15;
    # allow 104.16.0.0/13;
    # allow 104.24.0.0/14;
    # allow 172.64.0.0/13;
    # allow 131.0.72.0/22;
    # deny all;
}

