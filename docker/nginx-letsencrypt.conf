## HTTP: редирект на HTTPS
server {
    listen 80;
    server_name _;

    # Для обновления сертификата Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Редирект всего остального на HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

## HTTPS: Let's Encrypt сертификаты
server {
    listen 443 ssl http2;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Пути к Let's Encrypt сертификатам
    ssl_certificate     /etc/letsencrypt/live/bolotova.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bolotova.online/privkey.pem;

    # Современные SSL настройки
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/bolotova.online/chain.pem;

    # Безопасность: скрытие версии nginx
    server_tokens off;

    # Ограничение размера тела запроса (защита от DoS)
    client_max_body_size 1m;

    # Таймауты для защиты от slowloris-атак
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;
    keepalive_timeout 65s;

    # Content Security Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self';" always;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # SEO: robots.txt
    location = /robots.txt {
        add_header Content-Type text/plain;
        add_header Cache-Control "public, max-age=3600";
    }

    # SEO: sitemap.xml
    location = /sitemap.xml {
        add_header Content-Type application/xml;
        add_header Cache-Control "public, max-age=3600";
    }

    # SEO: llms.txt для AI-агентов
    location = /llms.txt {
        add_header Content-Type "text/plain; charset=utf-8";
        add_header Cache-Control "public, max-age=3600";
    }

    # SEO: llms-full.txt для AI-агентов
    location = /llms-full.txt {
        add_header Content-Type "text/plain; charset=utf-8";
        add_header Cache-Control "public, max-age=3600";
    }

    # MkDocs документация
    location /course/ {
        alias /usr/share/nginx/course/;
        index index.html;
        try_files $uri $uri/ $uri/index.html =404;

        # CSP специфичный для MkDocs Material theme
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

        # Запрет листинга директорий
        autoindex off;

        # Запрет доступа к скрытым файлам
        location ~ /\. {
            deny all;
            return 404;
        }

        # Кэширование статики MkDocs
        location ~* /course/.*\.(?:css|js|woff2?|ttf|eot)$ {
            access_log off;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header X-Content-Type-Options "nosniff" always;
        }
    }

    # Правило для SPA: всегда отдаём index.html, если файл не найден
    location / {
        try_files $uri $uri/ /index.html;
        
        # SEO: X-Robots-Tag для HTML-страниц
        add_header X-Robots-Tag "index, follow" always;
    }

    # Долгосрочное кеширование для JS и CSS
    location ~* \.(?:js|css)$ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Долгосрочное кеширование для изображений
    location ~* \.(?:png|jpe?g|gif|svg|webp|ico)$ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # JSON данные (часто обновляются) — без агрессивного кеширования
    location ~* \.(?:json)$ {
        add_header Cache-Control "no-cache";
    }

    # Gzip для оптимизации трафика
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types text/plain text/css application/javascript application/json application/xml+rss image/svg+xml;
}
