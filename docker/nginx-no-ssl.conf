## Временная конфигурация без SSL для диагностики
## Используйте эту конфигурацию, если Origin Certificate еще не установлен

## HTTP сервер (без редиректа на HTTPS)
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Content Security Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self';" always;

    # Безопасность: скрытие версии nginx
    server_tokens off;

    # Ограничение размера тела запроса (защита от DoS)
    client_max_body_size 1m;

    # Таймауты для защиты от slowloris-атак
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;
    keepalive_timeout 65s;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # MkDocs документация
    location /course/ {
        alias /usr/share/nginx/course/;
        index index.html;
        try_files $uri $uri/ $uri/index.html =404;

        # CSP специфичный для MkDocs Material theme
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

        # Запрет листинга директорий
        autoindex off;

        # Запрет доступа к скрытым файлам
        location ~ /\. {
            deny all;
            return 404;
        }

        # Кэширование статики MkDocs
        location ~* /course/.*\.(?:css|js|woff2?|ttf|eot)$ {
            access_log off;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header X-Content-Type-Options "nosniff" always;
        }
    }

    # Правило для SPA: всегда отдаём index.html, если файл не найден
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Долгосрочное кеширование для JS и CSS
    location ~* \.(?:js|css)$ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Долгосрочное кеширование для изображений
    location ~* \.(?:png|jpe?g|gif|svg|webp|ico)$ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # JSON данные (часто обновляются) — без агрессивного кеширования
    location ~* \.(?:json)$ {
        add_header Cache-Control "no-cache";
    }

    # Опционально: gzip для оптимизации трафика
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types text/plain text/css application/javascript application/json application/xml+rss image/svg+xml;
}
