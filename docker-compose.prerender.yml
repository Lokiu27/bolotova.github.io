services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.prerender
    container_name: portfolio-web
    ports:
      - "8081:80"   # HTTP для локальных проверок
      - "443:443"   # HTTPS от Cloudflare к Nginx (Origin Certificate)
    restart: unless-stopped
    volumes:
      # Монтируем Let's Encrypt сертификаты
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # Для обновления сертификата
      - /var/www/certbot:/var/www/certbot:ro
