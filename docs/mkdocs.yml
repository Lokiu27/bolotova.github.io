site_name: "Курс по бизнес-анализу"
site_url: "https://bolotova.online/course/"
docs_dir: "content"
site_dir: "site"

theme:
  name: material
  language: ru
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Тёмная тема
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Светлая тема
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - navigation.instant
    - navigation.instant.prefetch

plugins:
  - search:
      lang: ru
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - toc:
      permalink: true

extra:
  homepage: https://bolotova.online

nav:
  - "← На главную": "https://bolotova.online"
  - Главная: index.md
